# adapted from https://github.com/xlsynth/xlsynth-crate/blob/main/.github/workflows/ci.yml

name: Rust CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------
  # 1) Lint-check / pre-commit gate
  # -----------------------------------------------------------
  lint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: 1.85.0
          components: rustfmt

      - name: Set up Python + pre-commit
        run: |
          python -m pip install --require-hashes -r requirements-ci.txt

      - name: Run pre-commit
        env:
          SKIP: no-commit-to-branch
        run: |
          pre-commit install
          pre-commit run --all-files

  # -----------------------------------------------------------
  # 2) Build/test
  # -----------------------------------------------------------
  build-and-test:
    needs: [lint-check]  # Ensure lint checks pass first
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]  # TODO: add more OSes in the future
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          toolchain: 1.85.0

      - name: Download Slang
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/slang.tar.gz" \
            "https://github.com/MikePopoloski/slang/releases/download/v11.0/slang-linux-x86_64.tar.gz"
          echo "951a170e10e25e54c91565030acfdfc11c3226714ebf225a18ad4166a898d8a4  $RUNNER_TEMP/slang.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/slang.tar.gz"
          chmod +x slang

      - name: Run tests
        run: export SLANG_PATH=`realpath slang` && cargo test --locked
