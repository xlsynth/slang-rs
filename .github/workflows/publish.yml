# SPDX-License-Identifier: Apache-2.0

# adapted from https://github.com/xlsynth/xlsynth-crate/blob/main/.github/workflows/publish.yml

name: Publish to crates.io

on:
  push:
    tags:
      - 'v*' # This will trigger the workflow on version tags like v1.0.0, v0.1.0, etc.

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Validate version matches
      run: |
        # GITHUB_REF will be something like "refs/tags/v0.0.57"
        # We'll strip off the "refs/tags/" part, leaving "v0.0.57".
        VERSION="${GITHUB_REF#refs/tags/}"

        # Now invoke the Python script, passing the version.
        python check_version_is.py "$VERSION"

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        toolchain: 1.85.0

    - name: Cache Cargo registry
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo index
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-

    - name: Build and test
      run: |
        curl --fail --location --proto '=https' --tlsv1.2 -o "$RUNNER_TEMP/slang" \
          "https://github.com/xlsynth/slang-rs/releases/download/ci/slang"
        echo "0ae872c4d877eb153b21a9f2c78409a27a8e8a46ec956176e8b5f4c1c09874ea  $RUNNER_TEMP/slang" | sha256sum -c -
        chmod +x "$RUNNER_TEMP/slang"
        export SLANG_PATH="$RUNNER_TEMP/slang"
        cargo test --locked

    - name: Publish slang-rs to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
      run: |
        cargo publish --locked --token $CARGO_REGISTRY_TOKEN
