# SPDX-License-Identifier: Apache-2.0

name: Build Slang

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Download Slang Release
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 -o source.tar.gz \
            "https://github.com/MikePopoloski/slang/archive/refs/tags/v7.0.tar.gz"
          echo "5faa9bdac043b81eb489f0dd0de36443f6d5868460b7b442df87a6e8210e8547  source.tar.gz" | sha256sum -c -

      - name: Extract Tarball
        run: |
          mkdir source
          tar -xzf source.tar.gz -C source --strip-components=1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build Slang
        working-directory: source
        run: |
          cmake -B build
          cmake --build build -j8

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: slang
          path: 'source/build/bin/slang'

  build-rocky8:
    runs-on: ubuntu-24.04
    container: rockylinux:8@sha256:f5529992e67440c1a4ae7788244d4381c6909159a88eacd95b7523ae47ced82e

    steps:
      - name: Install Dependencies
        run: |
          dnf install -y python3 python3-devel
          dnf install -y gcc openssl-devel libffi-devel make cmake curl git

      - name: Install Clang-18
        run: |
          dnf install -y llvm-toolset

      - name: Note Clang version
        run: clang-18 --version

      - name: Download Slang Release
        run: |
          curl --fail --location --proto '=https' --tlsv1.2 -o source.tar.gz \
            "https://github.com/MikePopoloski/slang/archive/refs/tags/v7.0.tar.gz"
          echo "5faa9bdac043b81eb489f0dd0de36443f6d5868460b7b442df87a6e8210e8547  source.tar.gz" | sha256sum -c -

      - name: Extract Tarball
        run: |
          mkdir source
          tar -xzf source.tar.gz -C source --strip-components=1

      - name: Build Slang
        working-directory: source
        run: |
          CC=clang-18 CXX=clang++-18 cmake -B build
          CC=clang-18 CXX=clang++-18 cmake --build build -j8

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: slang-rocky8
          path: 'source/build/bin/slang'
